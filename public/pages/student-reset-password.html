<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nouveau mot de passe</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="d-flex align-items-center min-vh-100">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card shadow">
            <div class="card-body">
              <h3 class="mb-3 text-center">Choisir un nouveau mot de passe</h3>
              <p id="verifiedEmailText" class="text-muted small text-center mb-3"></p>
              <div id="resetMessage" class="alert hidden"></div>
              <form id="resetPasswordForm">
                <div class="mb-3">
                  <label for="newPassword" class="form-label">Nouveau mot de passe</label>
                  <input id="newPassword" type="password" class="form-control" required minlength="6" autocomplete="new-password" />
                </div>
                <div class="mb-3">
                  <label for="confirmPassword" class="form-label">Confirmer le mot de passe</label>
                  <input id="confirmPassword" type="password" class="form-control" required minlength="6" autocomplete="new-password" />
                </div>
                <button class="btn btn-primary w-100" type="submit">Enregistrer</button>
              </form>
              <a href="/pages/auth.html?role=student" class="btn btn-outline-secondary w-100 mt-2">Retour à la connexion</a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/student-reset-password.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Admin</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <span class="navbar-brand">Administration</span>
        <a href="/" class="btn btn-outline-light btn-sm">Retour</a>
      </div>
    </nav>

    <main class="container py-4">
      <div id="adminMessage" class="alert hidden"></div>

      <section class="mb-4">
        <h4>Statistiques</h4>
        <div id="statsContainer" class="row g-3"></div>
      </section>

      <section class="mb-4">
        <h4>Documents en attente</h4>
        <div id="pendingList"></div>
      </section>

      <section class="mb-4">
        <h4>Comptes étudiants en attente</h4>
        <div id="pendingStudentsList"></div>
      </section>

      <section>
        <h4>Gestion des catégories</h4>
        <form id="addCategoryForm" class="d-flex gap-2 mb-3">
          <input id="categoryName" class="form-control" placeholder="Nouvelle catégorie" required />
          <button class="btn btn-primary" type="submit">Ajouter</button>
        </form>
        <ul id="categoriesList" class="list-group"></ul>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>

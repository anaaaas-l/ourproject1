<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accueil</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="d-flex align-items-center min-vh-100 bg-light">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
          <div class="card shadow">
            <div class="card-body p-4">
              <h2 class="text-center mb-4">Accueil</h2>
              <p class="text-center text-muted mb-4">Choisissez votre espace: Étudiant ou Administrateur.</p>
              <div class="row g-3">
                <div class="col-md-6">
                  <a href="/pages/auth.html?role=student" class="btn btn-outline-primary w-100 p-4">
                    <i class="fa-solid fa-user-graduate fa-2x mb-2"></i><br />
                    Étudiant
                  </a>
                </div>
                <div class="col-md-6">
                  <a href="/pages/auth.html?role=admin" class="btn btn-outline-dark w-100 p-4">
                    <i class="fa-solid fa-user-shield fa-2x mb-2"></i><br />
                    Administrateur
                  </a>
                </div>
              </div>
              <div id="platformLinkWrapper" class="text-center mt-4 hidden">
                <a href="/" class="btn btn-link">Aller vers la plateforme de ressources</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/accueil.js"></script>
  </body>
</html>

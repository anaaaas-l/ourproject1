<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finaliser Inscription Étudiant</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="d-flex align-items-center min-vh-100">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card shadow">
            <div class="card-body">
              <h3 class="mb-3 text-center">Finaliser votre inscription</h3>
              <p id="verifiedEmailText" class="text-muted small text-center mb-3"></p>
              <p class="text-muted small text-center mb-3">
                Après avoir soumis ces informations, un administrateur devra approuver votre inscription pour que votre compte soit ajouté à la base et que vous puissiez vous connecter.
              </p>
              <div id="registerCompleteMessage" class="alert hidden"></div>
              <form id="registerCompleteForm">
                <div class="mb-3">
                  <label for="studentName" class="form-label">Nom complet</label>
                  <input id="studentName" class="form-control" required />
                </div>
                <div class="mb-3">
                  <label for="studentPassword" class="form-label">Mot de passe</label>
                  <input id="studentPassword" type="password" class="form-control" required />
                </div>
                <button class="btn btn-primary w-100" type="submit">Terminer l'inscription</button>
              </form>
              <a href="/pages/auth.html?role=student" class="btn btn-outline-secondary w-100 mt-2">
                Retour à la connexion étudiant
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/student-register-complete.js"></script>
  </body>
</html>

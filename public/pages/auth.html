<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authentification</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="d-flex align-items-center min-vh-100">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
          <div class="card shadow">
            <div class="card-body">
              <h3 id="authTitle" class="mb-3 text-center">Connexion</h3>
              <p id="roleDescription" class="text-muted text-center small mb-3"></p>
              <div id="authMessage" class="alert hidden"></div>
              <form id="authForm">
                <div id="nameGroup" class="mb-3 hidden">
                  <label class="form-label">Nom</label>
                  <input id="name" class="form-control" />
                </div>
                <div id="usernameGroup" class="mb-3 hidden">
                  <label class="form-label">Nom d'utilisateur admin</label>
                  <input id="username" class="form-control" />
                </div>
                <div id="emailGroup" class="mb-3">
                  <label id="emailLabel" class="form-label">Email</label>
                  <input id="email" type="email" class="form-control" required />
                </div>
                <div class="mb-3">
                  <label class="form-label" for="password">Mot de passe</label>
                  <div class="input-group password-input-group">
                    <input
                      id="password"
                      name="password"
                      type="password"
                      class="form-control"
                      required
                      autocomplete="current-password"
                    />
                    <button
                      type="button"
                      class="btn btn-outline-secondary"
                      id="togglePasswordBtn"
                      title="Afficher ou masquer le mot de passe"
                      aria-label="Afficher ou masquer le mot de passe"
                    >
                      <i class="fa-solid fa-eye" id="togglePasswordIcon"></i>
                    </button>
                  </div>
                </div>
                <button class="btn btn-primary w-100" type="submit">Valider</button>
              </form>
              <button id="switchModeBtn" class="btn btn-link w-100 mt-2">Pas de compte ? Inscrivez-vous</button>
              <a href="/pages/accueil.html" class="btn btn-outline-secondary w-100 mt-2">Retour accueil</a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
  </body>
</html>

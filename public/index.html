<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plateforme de Partage de Ressources</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="/"><i class="fa-solid fa-book-open"></i> Ressources</a>
        <div class="d-flex align-items-center gap-2">
          <div id="authButtons">
            <a class="btn btn-light btn-sm" href="/pages/accueil.html">Connexion / Inscription</a>
          </div>
          <div id="userActions" class="hidden">
            <span id="welcomeText" class="text-white me-2"></span>
            <a id="adminLink" class="btn btn-warning btn-sm hidden" href="/pages/admin.html">Admin</a>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm">Déconnexion</button>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div id="messageBox" class="alert hidden"></div>

      <section class="row g-3 mb-4">
        <div class="col-md-6">
          <input id="searchInput" class="form-control" placeholder="Rechercher par titre ou mot-clé..." />
        </div>
        <div class="col-md-6">
          <select id="filterCategory" class="form-select">
            <option value="">Toutes les catégories</option>
          </select>
        </div>
      </section>

      <section class="card shadow-sm mb-4">
        <div class="card-body">
          <h4><i class="fa-solid fa-upload"></i> Ajouter un document</h4>
          <form id="uploadForm" class="row g-3 mt-1">
            <div class="col-md-5">
              <input name="title" class="form-control" placeholder="Titre du document" required />
            </div>
            <div class="col-md-4">
              <select id="categorySelect" name="categoryId" class="form-select" required>
                <option value="">Choisir...</option>
              </select>
            </div>
            <div class="col-md-3">
              <input name="file" type="file" class="form-control" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,.webp" required />
            </div>
            <div class="col-12">
              <button class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i> Envoyer</button>
            </div>
          </form>
        </div>
      </section>

      <section>
        <h4 class="mb-3">Ressources disponibles</h4>
        <div id="resourcesList" class="row g-3"></div>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>

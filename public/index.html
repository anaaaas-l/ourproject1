<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documents entre étudiants</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="/"><i class="fa-solid fa-users"></i> Documents entre étudiants</a>
        <div class="d-flex align-items-center gap-2">
          <div id="authButtons">
            <a class="btn btn-light btn-sm" href="/pages/accueil.html">Connexion / Inscription</a>
          </div>
          <div id="userActions" class="hidden">
            <span id="welcomeText" class="text-white me-2"></span>
            <a id="adminLink" class="btn btn-warning btn-sm hidden" href="/pages/admin.html">Admin</a>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm">Déconnexion</button>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div id="messageBox" class="alert hidden mb-4"></div>

      <section id="studentPeerSection" class="hidden">
        <div class="row mb-4">
          <div class="col-12">
            <div class="card">
              <div class="card-header">
                <h4 class="section-title mb-0">
                  <i class="fa-solid fa-users text-primary me-2"></i>Documents entre étudiants
                </h4>
                <p class="section-subtitle mb-0 mt-1">
                  Partagez un document <strong>public</strong> (visible par tous) ou
                  <strong>privé</strong> avec un code d'accès unique
                </p>
              </div>
              <div class="card-body">
                <form id="studentShareForm" class="row g-3">
                  <div class="col-md-3">
                    <label class="form-label">Titre du document</label>
                    <input name="title" class="form-control" placeholder="Ex: TD1 Mathématiques" required />
                  </div>
                  <div class="col-md-3">
                    <label class="form-label">Catégorie</label>
                    <select id="peerCategorySelect" name="categoryId" class="form-select" required>
                      <option value="">Choisir une catégorie…</option>
                    </select>
                  </div>
                  <div class="col-md-2">
                    <label class="form-label">Visibilité</label>
                    <select name="visibility" class="form-select" required>
                      <option value="public">🌐 Public</option>
                      <option value="private">🔒 Privé</option>
                    </select>
                  </div>
                  <div class="col-md-2">
                    <label class="form-label">Fichier</label>
                    <input name="file" type="file" class="form-control" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,.webp" required />
                  </div>
                  <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">
                      <i class="fa-solid fa-cloud-arrow-up me-2"></i>Publier
                    </button>
                  </div>
                </form>
                <div id="studentShareCodeBanner" class="alert alert-warning hidden mt-3" role="alert"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="row g-4">
          <div class="col-lg-8">
            <div class="card h-100">
              <div class="card-header">
                <h5 class="section-title mb-0">
                  <i class="fa-solid fa-folder-open text-primary me-2"></i>Documents publics
                </h5>
              </div>
              <div class="card-body">
                <div class="row g-3 mb-4">
                  <div class="col-md-6">
                    <label class="form-label">Recherche</label>
                    <div class="input-group">
                      <input
                        id="peerSearchInput"
                        class="form-control"
                        type="search"
                        placeholder="Rechercher par titre…"
                        autocomplete="off"
                      />
                      <button type="button" id="peerSearchBtn" class="btn btn-primary">
                        <i class="fa-solid fa-magnifying-glass"></i>
                      </button>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Filtrer par catégorie</label>
                    <select id="peerFilterCategory" class="form-select">
                      <option value="">Toutes les catégories</option>
                    </select>
                  </div>
                </div>
                <div id="studentPublicDocsList"></div>
              </div>
            </div>
          </div>

          <div class="col-lg-4">
            <div class="card">
              <div class="card-header">
                <h5 class="section-title mb-0">
                  <i class="fa-solid fa-key text-primary me-2"></i>Accès privé
                </h5>
                <p class="section-subtitle mb-0 mt-1 small">Saisissez un code pour accéder à un document privé</p>
              </div>
              <div class="card-body">
                <div class="mb-3">
                  <label class="form-label">Code d'accès</label>
                  <div class="input-group">
                    <input id="privateDocCodeInput" type="text" class="form-control text-uppercase" placeholder="Ex: ABC123" autocomplete="off" />
                    <button id="privateDocResolveBtn" type="button" class="btn btn-primary">
                      <i class="fa-solid fa-unlock-keyhole"></i>
                    </button>
                  </div>
                </div>
                <div id="privateDocResolved" class="card bg-light border-primary hidden">
                  <div class="card-body">
                    <h6 class="fw-bold mb-2" id="privateDocResolvedTitle"></h6>
                    <p class="text-muted small mb-3" id="privateDocResolvedMeta"></p>
                    <button id="privateDocDownloadBtn" type="button" class="btn btn-success w-100">
                      <i class="fa-solid fa-file-arrow-down me-2"></i>Télécharger
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
